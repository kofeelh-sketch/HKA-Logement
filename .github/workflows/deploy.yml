name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          # Clé publishable = publique (déjà exposée dans le bundle) — sans danger.
          # La sécurité repose sur les règles RLS de Supabase.
          VITE_SUPABASE_URL: https://tgbakqjhsbojyilnfaky.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_hg2GZxgCEaFoDjPXHihLYQ_uHxyytVy
          VITE_ADMIN_EMAIL: kofeel.h@gmail.com
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
